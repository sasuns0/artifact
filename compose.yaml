services:
  frontend:
    build:
      context: ./artifact-next
      dockerfile: Dockerfile
    volumes:
      - ./artifact-next:/app/frontend
      - /app/frontend/node_modules
      - /app/frontend/.next
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8080
      - WATCHPACK_POLLING=true
    networks:
      - public
      - private
    depends_on:
      - backend

  backend:
    build:
      context: ./artifact-backend
      dockerfile: Dockerfile
    volumes:
      - ./artifact-backend:/app/backend
      - /app/backend/node_modules
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/artifact
    networks:
      - private
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
      POSTGRES_DB: artifact
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artifact"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  public:
  private:

volumes:
  back-notused:
  db-data:

secrets:
  db-password:
    file: db/password.txt
